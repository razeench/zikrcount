<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>مسبحة · Dhikr Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    background: #0a0a0a;
    color: #e8e0d5;
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .page { width: 100%; max-width: 560px; }

  /* Header */
  .header {
    padding: 36px 0 20px;
    border-bottom: 1px solid #161616;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-title .arabic { font-family: 'Amiri', serif; font-size: 24px; color: #c9b99a; }
  .header-title .sub { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #3a3a3a; margin-top: 3px; }
  .tabs { display: flex; gap: 3px; background: #0f0f0f; padding: 3px; border-radius: 6px; border: 1px solid #1a1a1a; }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    padding: 6px 16px; font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    border-radius: 3px; transition: all 0.2s; color: #383838;
  }
  .tab-btn.active { background: #1a1a1a; color: #e8e0d5; }

  /* View */
  .view { display: none; animation: fadeUp 0.35s ease; }
  .view.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* Pill buttons */
  .pills { display: flex; gap: 7px; margin-top: 28px; flex-wrap: wrap; }
  .pill {
    background: none; border: 1px solid #1c1c1c; cursor: pointer;
    padding: 7px 13px; font-family: 'Cormorant Garamond', serif;
    font-size: 13px; border-radius: 4px; transition: all 0.18s;
    letter-spacing: 0.05em; color: #444;
  }
  .pill:hover { border-color: #333; background: #0f0f0f; }
  .pill.active-pill { }

  /* Arabic display */
  .dhikr-display { text-align: center; margin-top: 44px; }
  .dhikr-arabic { font-family: 'Amiri', serif; font-size: 40px; line-height: 1.5; margin-bottom: 10px; transition: color 0.3s; }
  .dhikr-latin { font-size: 15px; color: #555; letter-spacing: 0.07em; transition: color 0.2s; }

  /* Main button */
  .counter-wrap { display: flex; justify-content: center; margin-top: 50px; }
  .counter-btn {
    position: relative; background: none; border: none; cursor: pointer;
    outline: none; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .counter-btn:active .ring { transform: scale(0.96); }
  .ring {
    width: 164px; height: 164px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: transform 0.12s ease;
    position: relative;
  }
  .ring-border {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid; opacity: 0.25;
    transition: border-color 0.3s, opacity 0.3s;
  }
  .ring-glow {
    position: absolute; inset: -1px; border-radius: 50%;
    transition: background 0.3s;
  }
  .count-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px; font-weight: 300; line-height: 1;
    position: relative; z-index: 1;
    transition: color 0.3s;
  }
  .count-label {
    font-size: 10px; color: #333; letter-spacing: 0.18em;
    text-transform: uppercase; margin-top: 5px;
    position: relative; z-index: 1;
  }
  .ripple {
    position: absolute; inset: -18px; border-radius: 50%;
    pointer-events: none; opacity: 0;
    animation: none;
  }
  .ripple.go { animation: rippleGo 0.55s ease-out forwards; }
  @keyframes rippleGo {
    from { opacity: 0.35; transform: scale(0.88); }
    to { opacity: 0; transform: scale(1.12); }
  }
  .pop { animation: popAnim 0.28s ease-out; }
  @keyframes popAnim {
    0% { transform: scale(1); } 45% { transform: scale(1.1); } 100% { transform: scale(1); }
  }
  .hint { text-align: center; margin-top: 12px; font-size: 10px; color: #282828; letter-spacing: 0.14em; text-transform: uppercase; }

  /* +1 button */
  .plus-wrap { display: flex; justify-content: center; margin-top: 28px; }
  .plus-btn {
    background: none;
    border: 1px solid #1e1e1e;
    cursor: pointer;
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    color: #333;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    outline: none;
    position: relative;
    overflow: hidden;
  }
  .plus-btn:hover { border-color: #333; color: #666; }
  .plus-btn:active { transform: scale(0.93); }
  .plus-btn.flash { animation: plusFlash 0.25s ease-out; }
  @keyframes plusFlash {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); border-color: currentColor; }
    100% { transform: scale(1); }
  }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; margin-top: 46px;
    background: #131313; border: 1px solid #161616; border-radius: 8px; overflow: hidden;
  }
  .stat-cell { padding: 16px 8px; background: #0c0c0c; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 400; color: #c9b99a; }
  .stat-lbl { font-size: 9px; color: #333; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 4px; }
  .stat-sub { font-size: 9px; color: #272727; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

  /* Contribution grid */
  .contrib-section { margin-top: 36px; }
  .contrib-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #2e2e2e; margin-bottom: 12px; }
  .month-row { display: flex; gap: 2px; margin-bottom: 5px; }
  .month-cell { width: 12px; font-size: 8px; color: #2e2e2e; font-family: 'Courier New', monospace; flex-shrink: 0; }
  .grid-weeks { display: flex; gap: 2px; }
  .grid-week { display: flex; flex-direction: column; gap: 2px; }
  .grid-day {
    width: 12px; height: 12px; border-radius: 2px;
    flex-shrink: 0; cursor: default;
    transition: transform 0.1s, opacity 0.1s;
    position: relative;
  }
  .grid-day:hover { transform: scale(1.4); z-index: 10; }
  .legend { display: flex; align-items: center; gap: 3px; margin-top: 8px; justify-content: flex-end; }
  .legend span { font-size: 9px; color: #262626; font-family: 'Courier New', monospace; }
  .legend-cell { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

  /* Tooltip */
  .tt {
    position: fixed; background: #161616; border: 1px solid #2a2a2a;
    color: #888; font-size: 11px; padding: 5px 9px; border-radius: 4px;
    pointer-events: none; z-index: 999; white-space: nowrap;
    font-family: 'Cormorant Garamond', serif; letter-spacing: 0.04em;
    transform: translate(-50%, -100%); margin-top: -6px;
    display: none;
  }

  /* Stats view */
  .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #333; margin-bottom: 22px; margin-top: 32px; }
  .dhikr-row { margin-bottom: 22px; }
  .dhikr-row-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
  .row-left { display: flex; gap: 10px; align-items: baseline; }
  .row-arabic { font-family: 'Amiri', serif; font-size: 17px; }
  .row-name { font-size: 11px; color: #3a3a3a; letter-spacing: 0.09em; }
  .row-right { display: flex; gap: 14px; align-items: baseline; }
  .row-today { font-size: 11px; color: #333; }
  .row-lifetime { font-size: 20px; color: #c9b99a; }
  .bar-track { height: 2px; background: #111; border-radius: 1px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 1px; transition: width 1s ease; opacity: 0.65; }
  .total-row { border-top: 1px solid #161616; padding-top: 16px; display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; }
  .total-label { font-size: 12px; color: #333; letter-spacing: 0.1em; }
  .total-val { font-size: 24px; color: #c9b99a; }

  .reset-area { text-align: center; margin-top: 44px; }
  .reset-btn {
    background: none; border: 1px solid #181818; cursor: pointer;
    padding: 9px 18px; font-family: 'Cormorant Garamond', serif;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #2e2e2e; border-radius: 4px; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #333; color: #555; }

  /* Install banner */
  .install-bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: #111; border-top: 1px solid #1e1e1e;
    padding: 14px 20px; justify-content: space-between; align-items: center;
    z-index: 100;
  }
  .install-bar.show { display: flex; }
  .install-text { font-size: 12px; color: #555; letter-spacing: 0.05em; }
  .install-btn-inner {
    background: none; border: 1px solid #333; cursor: pointer;
    padding: 7px 16px; font-family: 'Cormorant Garamond', serif;
    font-size: 12px; letter-spacing: 0.1em; color: #c9b99a;
    border-radius: 4px;
  }

  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .dhikr-arabic { font-size: 32px; }
    .count-num { font-size: 48px; }
    .ring { width: 148px; height: 148px; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <div class="arabic">مسبحة</div>
      <div class="sub">Dhikr Counter</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="counter" onclick="switchTab('counter')">Counter</button>
      <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">Stats</button>
    </div>
  </div>

  <!-- Counter View -->
  <div id="view-counter" class="view active">
    <!-- Dhikr pills -->
    <div class="pills" id="pills"></div>

    <!-- Arabic display -->
    <div class="dhikr-display">
      <div class="dhikr-arabic" id="dhikr-arabic"></div>
      <div class="dhikr-latin" id="dhikr-latin"></div>
    </div>

    <!-- Main counter button -->
    <div class="counter-wrap">
      <button class="counter-btn" id="main-btn" onclick="increment()" aria-label="Count dhikr">
        <div class="ripple" id="ripple"></div>
        <div class="ring" id="ring">
          <div class="ring-glow" id="ring-glow"></div>
          <div class="ring-border" id="ring-border"></div>
          <div class="count-num" id="count-today">0</div>
          <div class="count-label">today</div>
        </div>
      </button>
    </div>
    <div class="hint">tap · space · enter</div>

    <!-- +1 and reset buttons -->
    <div class="plus-wrap">
      <button class="plus-btn" id="plus-btn" onclick="plusOne()" aria-label="Add one">+1</button>
      <button class="plus-btn" id="reset-today-btn" onclick="resetToday()" aria-label="Reset today" style="width:52px;height:52px;font-size:13px;letter-spacing:0.1em;margin-left:16px;align-self:center;">reset</button>
    </div>

    <!-- Stats row -->
    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-val" id="s-today">0</div>
        <div class="stat-lbl">Today</div>
        <div class="stat-sub" id="s-today-sub">–</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-lifetime">0</div>
        <div class="stat-lbl">Lifetime</div>
        <div class="stat-sub" id="s-lt-sub">–</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-all-today">0</div>
        <div class="stat-lbl">All Today</div>
        <div class="stat-sub">total</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="s-all-lt">0</div>
        <div class="stat-lbl">All Time</div>
        <div class="stat-sub">total</div>
      </div>
    </div>

    <!-- Mini contribution grid for selected -->
    <div class="contrib-section" id="counter-contrib"></div>
  </div>

  <!-- Stats View -->
  <div id="view-stats" class="view">
    <div class="section-label" style="margin-top:28px">Breakdown</div>
    <div id="breakdown-rows"></div>
    <div class="total-row">
      <span class="total-label">Total Lifetime</span>
      <span class="total-val" id="grand-total">0</span>
    </div>

    <!-- All dhikr grid -->
    <div class="contrib-section" id="all-contrib"></div>

    <!-- Per dhikr grids -->
    <div id="per-contrib"></div>

    <div class="reset-area">
      <button class="reset-btn" onclick="resetData()">Reset all data</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tt" id="tooltip"></div>

<script>
const DHIKR = [
  { id: "astaghfirullah", label: "Astaghfirullah", arabic: "أَسْتَغْفِرُ اللَّه", color: "#4ade80", short: "Istighfar" },
  { id: "subhanallah",    label: "SubhanAllah",    arabic: "سُبْحَانَ اللَّه",   color: "#60a5fa", short: "Tasbih" },
  { id: "alhamdulillah", label: "Alhamdulillah",  arabic: "الْحَمْدُ لِلَّه",   color: "#f59e0b", short: "Tahmid" },
  { id: "allahuakbar",   label: "Allahu Akbar",   arabic: "اللَّهُ أَكْبَر",    color: "#a78bfa", short: "Takbir" },
  { id: "lailahaillallah", label: "La ilaha illAllah", arabic: "لَا إِلَٰهَ إِلَّا اللَّه", color: "#f87171", short: "Tahlil" },
];

let selected = DHIKR[0].id;
let data = load();

function today() { return new Date().toISOString().split("T")[0]; }

function load() {
  try { return JSON.parse(localStorage.getItem("dhikr_data")) || { daily:{}, lifetime:{} }; }
  catch { return { daily:{}, lifetime:{} }; }
}
function save() { localStorage.setItem("dhikr_data", JSON.stringify(data)); }

function getToday(id) { return data.daily?.[today()]?.[id] || 0; }
function getLifetime(id) { return data.lifetime?.[id] || 0; }
function getTotalToday() { return Object.values(data.daily?.[today()] || {}).reduce((a,b)=>a+b,0); }
function getTotalLifetime() { return Object.values(data.lifetime || {}).reduce((a,b)=>a+b,0); }

function resetToday() {
  const t = today();
  if (!data.daily[t]) return;
  data.daily[t][selected] = 0;
  save();
  updateCounterView();
  const btn = document.getElementById("reset-today-btn");
  btn.classList.remove("flash");
  void btn.offsetWidth;
  btn.classList.add("flash");
}

function plusOne() {
  const btn = document.getElementById("plus-btn");
  btn.classList.remove("flash");
  void btn.offsetWidth;
  btn.classList.add("flash");
  increment();
}

function increment() {
  const t = today();
  if (!data.daily[t]) data.daily[t] = {};
  data.daily[t][selected] = (data.daily[t][selected] || 0) + 1;
  data.lifetime[selected] = (data.lifetime[selected] || 0) + 1;
  save();
  triggerRipple();
  updateCounterView();
}

function triggerRipple() {
  const r = document.getElementById("ripple");
  const d = DHIKR.find(x => x.id === selected);
  r.style.border = `2px solid ${d.color}`;
  r.classList.remove("go");
  void r.offsetWidth;
  r.classList.add("go");
  const n = document.getElementById("count-today");
  n.classList.remove("pop");
  void n.offsetWidth;
  n.classList.add("pop");
}

function selectDhikr(id) {
  selected = id;
  document.querySelectorAll(".pill").forEach(p => {
    const d = DHIKR.find(x => x.id === p.dataset.id);
    const active = p.dataset.id === id;
    p.style.color = active ? d.color : "#444";
    p.style.borderColor = active ? d.color + "55" : "#1c1c1c";
    p.style.background = active ? d.color + "0f" : "none";
  });
  const d = DHIKR.find(x => x.id === id);
  document.getElementById("dhikr-arabic").textContent = d.arabic;
  document.getElementById("dhikr-arabic").style.color = d.color;
  document.getElementById("dhikr-latin").textContent = d.label;
  document.getElementById("ring-border").style.borderColor = d.color;
  document.getElementById("ring-glow").style.background = `radial-gradient(circle at 40% 35%, ${d.color}0e 0%, transparent 65%)`;
  document.getElementById("count-today").style.color = d.color;
  document.querySelector(".counter-btn .ring").style.boxShadow = `0 0 40px ${d.color}0a`;
  const pb = document.getElementById("plus-btn");
  pb.style.color = d.color + "99";
  pb.style.borderColor = d.color + "33";
  const rb = document.getElementById("reset-today-btn");
  rb.style.color = "#333";
  rb.style.borderColor = "#1e1e1e";
  updateCounterView();
}

function updateCounterView() {
  const d = DHIKR.find(x => x.id === selected);
  document.getElementById("count-today").textContent = getToday(selected).toLocaleString();
  document.getElementById("s-today").textContent = getToday(selected).toLocaleString();
  document.getElementById("s-today-sub").textContent = d.short;
  document.getElementById("s-lifetime").textContent = getLifetime(selected).toLocaleString();
  document.getElementById("s-lt-sub").textContent = d.short;
  document.getElementById("s-all-today").textContent = getTotalToday().toLocaleString();
  document.getElementById("s-all-lt").textContent = getTotalLifetime().toLocaleString();
  renderContrib("counter-contrib", day => data.daily?.[day]?.[selected] || 0, d.color, `${d.short} — last 365 days`);
}

function updateStatsView() {
  const total = getTotalLifetime();
  document.getElementById("grand-total").textContent = total.toLocaleString();
  const rows = document.getElementById("breakdown-rows");
  rows.innerHTML = "";
  DHIKR.forEach(d => {
    const lt = getLifetime(d.id), td = getToday(d.id);
    const pct = total > 0 ? (lt/total)*100 : 0;
    rows.innerHTML += `
      <div class="dhikr-row">
        <div class="dhikr-row-top">
          <div class="row-left">
            <span class="row-arabic" style="color:${d.color}">${d.arabic}</span>
            <span class="row-name">${d.label}</span>
          </div>
          <div class="row-right">
            <span class="row-today">${td.toLocaleString()} today</span>
            <span class="row-lifetime">${lt.toLocaleString()}</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
      </div>`;
  });
  renderContrib("all-contrib", day => Object.values(data.daily?.[day]||{}).reduce((a,b)=>a+b,0), "#c9b99a", "All dhikr — last 365 days");
  const pc = document.getElementById("per-contrib");
  pc.innerHTML = "";
  DHIKR.forEach(d => {
    const el = document.createElement("div");
    el.id = `contrib-${d.id}`;
    pc.appendChild(el);
    renderContrib(`contrib-${d.id}`, day => data.daily?.[day]?.[d.id] || 0, d.color, `${d.short} — ${d.arabic}`);
  });
}

// Build 365-day grid
function getLast365() {
  const days = [], now = new Date();
  for (let i = 364; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate()-i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function renderContrib(containerId, getCount, color, label) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const days = getLast365();
  const weeks = [];
  for (let i = 0; i < days.length; i+=7) weeks.push(days.slice(i, i+7));
  const allCounts = days.map(getCount);
  const maxVal = Math.max(...allCounts, 1);

  // Month labels
  let lastMonth = null, months = [];
  weeks.forEach((week, wi) => {
    const m = new Date(week[0]).toLocaleString("default",{month:"short"});
    if (m !== lastMonth) { months.push({label:m, week:wi}); lastMonth=m; }
  });

  let html = `<div class="contrib-label">${label}</div>`;
  // Month row
  html += `<div class="month-row">`;
  weeks.forEach((_,wi) => {
    const entry = months.find(m=>m.week===wi);
    html += `<div class="month-cell">${entry?entry.label:""}</div>`;
  });
  html += `</div>`;
  // Weeks
  html += `<div class="grid-weeks">`;
  weeks.forEach(week => {
    html += `<div class="grid-week">`;
    week.forEach(day => {
      const cnt = getCount(day);
      const op = cnt === 0 ? 1 : Math.max(0.12, cnt/maxVal);
      const bg = cnt === 0 ? "#131313" : color;
      const border = cnt === 0 ? "border:1px solid #1a1a1a;" : "";
      html += `<div class="grid-day" style="background:${bg};opacity:${op};${border}" data-day="${day}" data-cnt="${cnt}"></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  // Legend
  html += `<div class="legend"><span>less</span>`;
  [0,0.15,0.35,0.6,1].forEach(o => {
    if (o===0) html += `<div class="legend-cell" style="background:#131313;border:1px solid #1a1a1a;"></div>`;
    else html += `<div class="legend-cell" style="background:${color};opacity:${o};"></div>`;
  });
  html += `<span>more</span></div>`;

  container.innerHTML = `<div class="contrib-section">${html}</div>`;

  // Tooltips
  container.querySelectorAll(".grid-day").forEach(el => {
    el.addEventListener("mouseenter", e => {
      const tt = document.getElementById("tooltip");
      const day = el.dataset.day, cnt = parseInt(el.dataset.cnt);
      tt.innerHTML = `<span style="color:#666">${day}</span> · <span style="color:${color}">${cnt.toLocaleString()}</span>`;
      tt.style.display = "block";
      positionTooltip(e);
    });
    el.addEventListener("mousemove", positionTooltip);
    el.addEventListener("mouseleave", () => { document.getElementById("tooltip").style.display = "none"; });
  });
}

function positionTooltip(e) {
  const tt = document.getElementById("tooltip");
  tt.style.left = e.clientX + "px";
  tt.style.top = (e.clientY - 8) + "px";
}

function switchTab(tab) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${tab}`).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  if (tab === "stats") updateStatsView();
}

function resetData() {
  if (confirm("Reset all data? This cannot be undone.")) {
    data = { daily:{}, lifetime:{} }; save(); updateCounterView();
    document.querySelectorAll("[id^=s-]").forEach(el => el.textContent = "0");
    if (document.getElementById("view-stats").classList.contains("active")) updateStatsView();
  }
}

// Init pills
function initPills() {
  const wrap = document.getElementById("pills");
  DHIKR.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.dataset.id = d.id;
    btn.textContent = d.short;
    btn.onclick = () => selectDhikr(d.id);
    wrap.appendChild(btn);
  });
}

// Keyboard
document.addEventListener("keydown", e => {
  if ((e.code==="Space"||e.code==="Enter") && !e.target.matches("button,input,select,textarea")) {
    e.preventDefault(); increment();
  }
});

// PWA install prompt
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById("install-bar").classList.add("show");
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById("install-bar").classList.remove("show");
    });
  }
}

initPills();
selectDhikr(DHIKR[0].id);
updateCounterView();
</script>

<!-- Install bar -->
<div class="install-bar" id="install-bar">
  <span class="install-text">Add to home screen</span>
  <button class="install-btn-inner" onclick="installApp()">Install</button>
</div>

</body>
</html>
